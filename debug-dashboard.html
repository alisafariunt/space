<!DOCTYPE html>
<html>

<head>
    <title>Debug Helper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 11px;
            max-height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        h2 {
            color: #334155;
            margin-top: 2rem;
        }

        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .status.success {
            background: #d1fae5;
            color: #059669;
        }

        .status.error {
            background: #fee2e2;
            color: #dc2626;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .section {
            margin-bottom: 2rem;
            padding: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <h1>🔧 Dashboard Debug Helper</h1>

    <div class="section">
        <h2>1️⃣ Quick Actions</h2>
        <button class="btn-danger" onclick="clearAllData()">🗑️ Clear ALL Local Data</button>
        <button class="btn-primary" onclick="forceSync()">🔄 Force Full Sync</button>
        <button class="btn-success" onclick="goToDashboard()">📊 Go to Dashboard</button>
        <div id="status"></div>
    </div>

    <div class="section">
        <h2>2️⃣ Raw API Check (See what database returns)</h2>
        <button class="btn-warning" onclick="checkRawAPI()">📡 Check Raw Sync API Response</button>
        <h3>Server Response:</h3>
        <pre id="apiResponse">Click button above to check...</pre>
    </div>

    <div class="section">
        <h2>3️⃣ Current localStorage Data</h2>
        <button onclick="checkLocalStorage()">🔍 Refresh</button>

        <h3>Progress:</h3>
        <pre id="progress">Loading...</pre>

        <h3>Highlights:</h3>
        <pre id="highlights">Loading...</pre>
    </div>

    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sync.js"></script>
    <script>
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function checkLocalStorage() {
            const progress = localStorage.getItem('studyGuide_progress');
            const highlights = localStorage.getItem('studyGuide_highlights');

            document.getElementById('progress').textContent = progress
                ? JSON.stringify(JSON.parse(progress), null, 2)
                : 'EMPTY';
            document.getElementById('highlights').textContent = highlights
                ? JSON.stringify(JSON.parse(highlights), null, 2)
                : 'EMPTY';
        }

        function clearAllData() {
            localStorage.removeItem('studyGuide_progress');
            localStorage.removeItem('studyGuide_highlights');
            localStorage.removeItem('studyGuide_lastSync');
            localStorage.removeItem('studyGuide_syncQueue');
            showStatus('✅ All local data cleared!', 'success');
            checkLocalStorage();
        }

        async function forceSync() {
            showStatus('⏳ Syncing with server...', 'info');

            if (!window.StudyGuideSync) {
                showStatus('❌ Sync module not loaded. Are you logged in?', 'error');
                return;
            }

            try {
                const result = await window.StudyGuideSync.forceFullSync({ skipConfirm: true });
                console.log('Sync result:', result);

                if (result && result.success) {
                    showStatus('✅ Sync successful! Data loaded.', 'success');
                } else {
                    showStatus('⚠️ Sync returned: ' + JSON.stringify(result), 'error');
                }
                checkLocalStorage();
            } catch (err) {
                showStatus('❌ Sync error: ' + err.message, 'error');
                console.error(err);
            }
        }

        async function checkRawAPI() {
            const outputEl = document.getElementById('apiResponse');
            outputEl.textContent = '⏳ Fetching from server...';

            try {
                // Get access token - check sessionStorage first, then AuthManager
                let token = sessionStorage.getItem('studyGuide_accessToken');

                if (!token && window.AuthManager) {
                    try {
                        token = window.AuthManager.getAccessToken();
                    } catch (e) {
                        console.log('AuthManager.getAccessToken error:', e);
                    }
                }

                if (!token) {
                    outputEl.textContent = '❌ No access token found.\n\nsessionStorage keys: ' +
                        Object.keys(sessionStorage).join(', ') +
                        '\n\nlocalStorage keys: ' + Object.keys(localStorage).join(', ');
                    return;
                }

                const response = await fetch('/api/sync?since=1970-01-01T00:00:00.000Z', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                });

                const data = await response.json();

                outputEl.textContent = `Status: ${response.status}\n\n` + JSON.stringify(data, null, 2);

                // Summary
                const summary = {
                    highlights: data.highlights?.length || 0,
                    bookmarks: data.bookmarks?.length || 0,
                    notes: data.notes?.length || 0,
                    progress: data.progress?.length || 0,
                    dailyStats: data.dailyStats?.length || 0,
                    hasPreferences: !!data.preferences
                };

                console.log('API Response Summary:', summary);

            } catch (err) {
                outputEl.textContent = '❌ Error: ' + err.message;
            }
        }

        function goToDashboard() {
            window.location.href = '/courses/';
        }

        // Auto-check on load
        setTimeout(checkLocalStorage, 500);
    </script>
</body>

</html>
